version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
    labels:
      - dependencies
      - gradle
    commit-message:
      prefix: chore
      include: scope
