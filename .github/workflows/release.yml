name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish or create
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  JAVA_VERSION: "17"

jobs:
  release:
    name: Build And Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASS=${{ secrets.KEYSTORE_PASS }}" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "KEY_PASS=${{ secrets.KEY_PASS }}" >> "$GITHUB_ENV"

      - name: Spotless check
        run: ./gradlew spotlessCheck --stacktrace

      - name: Lint
        run: ./gradlew lint --stacktrace

      - name: Unit tests
        run: ./gradlew test --stacktrace

      - name: Assemble signed release
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ github.run_id }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/**
            app/build/reports/**
            common/build/reports/**
            xposed/build/reports/**
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG_NAME: ${{ github.event.inputs.tag_name }}
        run: |
          shopt -s nullglob
          assets=(app/build/outputs/apk/release/*.apk)
          if [ -f app/build/outputs/mapping/release/mapping.txt ]; then
            assets+=(app/build/outputs/mapping/release/mapping.txt)
          fi

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi

          if [ -n "$INPUT_TAG_NAME" ]; then
            tag_name="$INPUT_TAG_NAME"
          else
            tag_name="$GITHUB_REF_NAME"
          fi

          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release upload "$tag_name" "${assets[@]}" --clobber
          else
            gh release create "$tag_name" "${assets[@]}" --generate-notes --target "$GITHUB_SHA"
          fi
