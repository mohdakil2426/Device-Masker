name: Signed Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  release:
    name: Build Signed Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Check release signing secrets
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          missing=()
          [ -n "$KEYSTORE_BASE64" ] || missing+=("KEYSTORE_BASE64")
          [ -n "$KEYSTORE_PASS" ] || missing+=("KEYSTORE_PASS")
          [ -n "$KEY_ALIAS" ] || missing+=("KEY_ALIAS")
          [ -n "$KEY_PASS" ] || missing+=("KEY_PASS")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Release signing secrets are incomplete: ${missing[*]}"
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_signing=true" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore
        if: steps.signing.outputs.has_signing == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          test -n "$KEYSTORE_BASE64"
          test -n "$KEYSTORE_PASS"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASS"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASS=$KEYSTORE_PASS" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "KEY_PASS=$KEY_PASS" >> "$GITHUB_ENV"

      - name: Spotless check
        if: steps.signing.outputs.has_signing == 'true'
        run: ./gradlew spotlessCheck --stacktrace

      - name: Lint
        if: steps.signing.outputs.has_signing == 'true'
        run: ./gradlew lint --stacktrace

      - name: Unit tests
        if: steps.signing.outputs.has_signing == 'true'
        run: ./gradlew test --stacktrace

      - name: Assemble signed release
        if: steps.signing.outputs.has_signing == 'true'
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload release artifacts
        if: steps.signing.outputs.has_signing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-artifacts-${{ github.run_id }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/**
            app/build/reports/**
            common/build/reports/**
            xposed/build/reports/**
          if-no-files-found: error
          retention-days: 14

      - name: Report skipped signed release
        if: steps.signing.outputs.has_signing != 'true'
        run: |
          echo "Signed release artifact was skipped because release signing secrets are incomplete."
          echo "Add KEYSTORE_BASE64, KEYSTORE_PASS, KEY_ALIAS, and KEY_PASS as repository Actions secrets."
