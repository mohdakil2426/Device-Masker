name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Spotless check
        run: ./gradlew spotlessCheck --stacktrace

      - name: Compile debug Kotlin
        run: ./gradlew :app:compileDebugKotlin :common:compileDebugKotlin :xposed:compileDebugKotlin --stacktrace

      - name: Lint
        run: ./gradlew lint --stacktrace

      - name: Unit tests
        run: ./gradlew test --stacktrace

      - name: Upload lint and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ github.run_id }}
          path: |
            app/build/reports/**
            common/build/reports/**
            xposed/build/reports/**
          if-no-files-found: warn
          retention-days: 7

  assemble-debug:
    name: Assemble Debug
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Assemble debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks-${{ github.run_id }}
          path: |
            app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  assemble-signed-release:
    name: Assemble Signed Release
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          test -n "$KEYSTORE_BASE64"
          test -n "$KEYSTORE_PASS"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASS"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASS=$KEYSTORE_PASS" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "KEY_PASS=$KEY_PASS" >> "$GITHUB_ENV"

      - name: Assemble signed release
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-artifacts-${{ github.run_id }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/mapping/release/**
          if-no-files-found: error
          retention-days: 14
