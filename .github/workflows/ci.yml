name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Spotless check
        run: ./gradlew spotlessCheck --build-cache --stacktrace

      - name: Detekt
        run: ./gradlew detekt --build-cache --stacktrace

      - name: Compile debug Kotlin
        run: ./gradlew :app:compileDebugKotlin :common:compileDebugKotlin :xposed:compileDebugKotlin --build-cache --stacktrace

      - name: Lint
        run: ./gradlew lint --build-cache --stacktrace

      - name: Unit tests
        run: ./gradlew test --build-cache --stacktrace

      - name: R8 validation build
        run: ./gradlew :app:assembleCiRelease --build-cache --stacktrace

      - name: Upload lint and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ github.run_id }}
          path: |
            app/build/reports/**
            common/build/reports/**
            xposed/build/reports/**
          if-no-files-found: warn
          retention-days: 7

  assemble-debug:
    name: Assemble Debug
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Assemble debug
        run: ./gradlew assembleDebug --build-cache --stacktrace

      - name: Prepare debug artifact
        run: |
          VERSION_NAME=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2)
          VERSION_CODE=$(grep '^VERSION_CODE=' gradle.properties | cut -d= -f2)
          SHORT_SHA="${GITHUB_SHA::7}"
          mkdir -p dist
          apk_files=(app/build/outputs/apk/debug/*.apk)
          if [ "${#apk_files[@]}" -ne 1 ]; then
            echo "Expected exactly one debug APK, found ${#apk_files[@]}"
            printf '%s\n' "${apk_files[@]}"
            exit 1
          fi
          cp "${apk_files[0]}" "dist/DeviceMasker-v${VERSION_NAME}+${VERSION_CODE}-debug-${SHORT_SHA}.apk"

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: DeviceMasker-debug-${{ github.run_id }}
          path: |
            dist/*.apk
          if-no-files-found: error
          retention-days: 14
