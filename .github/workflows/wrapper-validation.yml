name: Validate Gradle Wrapper

on:
  pull_request:
    paths:
      - "gradlew"
      - "gradlew.bat"
      - "gradle/wrapper/**"
  push:
    branches:
      - main
    paths:
      - "gradlew"
      - "gradlew.bat"
      - "gradle/wrapper/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wrapper-validation:
    name: Wrapper Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5
